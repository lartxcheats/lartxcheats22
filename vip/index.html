<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#5865F2">
    <meta name="description" content="Discord - Chat for Communities">
    <title>Discord</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
    <link rel="apple-touch-icon" href="discord-icon.png">
</head>
<body>
    <div id="particles-js"></div>
    
    <div class="container">
        <header>
            <img src="../gu.jpeg" alt="Avatar" class="avatar">
            <h1 class="titulo-gamer">
                <span class="vip-badge">👑 VIP</span>
                AUXILIO LartxCheats
            </h1>
            <button id="installBtn" class="install-btn" style="display: none;">
                Instalar App
            </button>
        </header>

        <main>
            <div class="card">
                <h2>Digite seu Usuário VIP:</h2>
                <textarea id="userInput" placeholder="Digite seu usuário VIP..."></textarea>
                
                <h2>Digite sua Key VIP:</h2>
                <textarea id="noteInput" placeholder="Cole sua key VIP aqui..."></textarea>
                
                <div id="errorMessage" class="error-message" style="display: none;"></div>
                
                <button id="saveBtn" class="btn-primary">Entrar</button>
                
                <div class="termos">
                    <a href="#" id="termosLink">
                        ⚠️ Versão VIP Premium. Não nos responsabilizamos por mal uso.
                    </a>
                </div>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script src="../api-config.js"></script>
    <script src="app.js"></script>
</body>
</html>
