<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Teste Simples</title>
    <style>
        body {
            background: #000;
            color: #fff;
            font-family: Arial;
            padding: 50px;
        }
        
        .btn {
            background: #0066cc;
            color: white;
            padding: 20px 40px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 18px;
            margin: 10px;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 3000;
            align-items: center;
            justify-content: center;
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-content {
            background: #001a33;
            border: 2px solid #0066cc;
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            text-align: center;
        }
        
        h2 {
            color: #00d9ff;
        }
        
        .info {
            background: rgba(0, 102, 204, 0.2);
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
        }
        
        .chave {
            background: #000;
            padding: 15px;
            border-radius: 5px;
            word-break: break-all;
            font-family: monospace;
            color: #00ff88;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <h1>🧪 Teste Ultra Simples</h1>
    
    <p>Clique no botão abaixo. Se o modal aparecer, o problema está em outro lugar.</p>
    
    <button class="btn" onclick="abrirModal()">TESTE 1: Abrir Modal</button>
    
    <button class="btn" onclick="testeConsole()">TESTE 2: Verificar Console</button>
    
    <div id="resultado" style="margin-top: 30px; padding: 20px; background: #001a33; border-radius: 10px;">
        <h3>Resultado:</h3>
        <p id="status">Aguardando teste...</p>
    </div>
    
    <!-- Modal -->
    <div class="modal" id="modalTeste">
        <div class="modal-content">
            <h2>✅ MODAL FUNCIONANDO!</h2>
            
            <div class="info">
                <p><strong>Se você está vendo isso, o modal funciona!</strong></p>
                <p>Produto: Teste</p>
                <p style="color: #00ff88; font-size: 24px; font-weight: bold;">R$ 20,00</p>
            </div>
            
            <div class="chave">
                23652c43-84f7-45a6-9c59-dc11b8f80ed3
            </div>
            
            <button class="btn" onclick="fecharModal()">Fechar</button>
        </div>
    </div>
    
    <script>
        console.log('✅ Script carregado');
        
        function abrirModal() {
            console.log('🔵 Função abrirModal() chamada');
            
            const modal = document.getElementById('modalTeste');
            console.log('🔵 Modal element:', modal);
            
            if (!modal) {
                console.error('❌ Modal não encontrado!');
                document.getElementById('status').innerHTML = '❌ ERRO: Modal não encontrado!';
                return;
            }
            
            console.log('🔵 Adicionando classe "active"...');
            modal.classList.add('active');
            
            console.log('🔵 Classes do modal:', modal.className);
            console.log('🔵 Display do modal:', window.getComputedStyle(modal).display);
            
            document.getElementById('status').innerHTML = '✅ Modal deveria estar aberto! Verifique se apareceu na tela.';
        }
        
        function fecharModal() {
            console.log('🔵 Fechando modal...');
            document.getElementById('modalTeste').classList.remove('active');
            document.getElementById('status').innerHTML = '✅ Modal fechado. Teste novamente!';
        }
        
        function testeConsole() {
            console.log('=== TESTE DE CONSOLE ===');
            console.log('Modal element:', document.getElementById('modalTeste'));
            console.log('Modal classes:', document.getElementById('modalTeste').className);
            console.log('Modal display:', window.getComputedStyle(document.getElementById('modalTeste')).display);
            
            document.getElementById('status').innerHTML = '✅ Verifique o Console (F12) para ver os logs';
            
            alert('Verifique o Console do navegador (pressione F12)');
        }
        
        // Teste automático ao carregar
        window.onload = function() {
            console.log('✅ Página carregada');
            console.log('✅ Modal encontrado:', document.getElementById('modalTeste') ? 'SIM' : 'NÃO');
        };
    </script>
</body>
</html>
